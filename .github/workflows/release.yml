name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: helper/go.mod

      - name: vet + test
        run: make check

      - name: cross-compile all targets
        run: make build-all

      - name: checksums
        working-directory: dist
        run: shasum -a 256 ac-helper-* > SHA256SUMS

      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/ac-helper-darwin-amd64
            dist/ac-helper-darwin-arm64
            dist/ac-helper-linux-amd64
            dist/ac-helper-linux-arm64
            dist/SHA256SUMS
