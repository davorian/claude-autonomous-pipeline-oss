# .auto_claude.conf — claude-autonomous-pipeline
#
# Test suites for auto_claude modifying itself.
# Tests source individual functions from bin/auto_claude and run
# them in isolation — no Claude invocation needed.

MAX_LOC=400  # auto_claude is a single large script; phases are dense

PLAN_CONTEXT="This is the auto_claude pipeline tool itself — a bash script (~3000 lines)
at bin/auto_claude plus a parallel orchestrator at bin/worktree_auto_claude.
Tests are in tests/ and source functions via sed/awk extraction.
Read CLAUDE.md for project structure and conventions."

REVIEW_EXTRAS="- Bash 3.2 compatibility is mandatory (macOS default). No associative arrays in auto_claude, no \${var,,} lowercase.
- All state updates must go through _jq_update (atomic read-modify-write).
- New config variables must have defaults in the Configuration Defaults section.
- New phases need a phase_<name> function and must be added to the PHASES array."

FRESH_REVIEW_PREAMBLE="Read CLAUDE.md first for project structure and bash conventions."

DOC_UPDATE_CONTEXT="Update README.md if new phases, config variables, or CLI flags are added.
Update docs/auto_claude.md if pipeline architecture changes.
Update CLAUDE.md file map if new files are created."

# ─── Test Suites ────────────────────────────────────────────────────────────

test_suite_state() {
  cd "$PROJECT_ROOT"
  bash tests/test_auto_claude_state.sh 2>&1
}

test_suite_pipeline() {
  cd "$PROJECT_ROOT"
  bash tests/test_auto_claude_pipeline.sh 2>&1
}

test_suite_ci_checks() {
  cd "$PROJECT_ROOT"
  bash tests/test_auto_claude_ci_checks.sh 2>&1
}

test_suite_shellcheck() {
  cd "$PROJECT_ROOT"
  if command -v shellcheck &>/dev/null; then
    shellcheck -x -s bash bin/auto_claude bin/worktree_auto_claude 2>&1
  else
    echo "shellcheck not installed — skipping"
    return 0
  fi
}

test_suite_syntax() {
  cd "$PROJECT_ROOT"
  bash -n bin/auto_claude 2>&1 && bash -n bin/worktree_auto_claude 2>&1
}
