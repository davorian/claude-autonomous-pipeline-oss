# .auto_claude.conf - user_home (Multiverse Learner Homepage)
# TypeScript Next.js 14 App Router + tRPC + Prisma + Vitest + Playwright

test_suite_vitest() {
  npm run test:ci-unit
}

ci_check_format() { npm run prettier-check 2>&1; }
ci_fix_format()   { npm run prettier-fix 2>&1; }
ci_check_lint()   { npm run lint 2>&1; }
ci_fix_lint()     { npm run lint:fix 2>&1; }
ci_check_types()  { npx tsc --noEmit 2>&1; }

PLAN_CONTEXT="Multiverse learner/apprentice homepage (Next.js 14 App Router, tRPC, Prisma, PostgreSQL, Tailwind CSS). Serves the learner-facing homepage at home.multiverse.io. Consumes 34+ RabbitMQ events and produces 8+ events. Has server components, client components, tRPC routers, Prisma repository layer, and event consumers. Uses @multiverse-io/stardust-react design system. Owned by seadragons team."

REVIEW_EXTRAS="Accessibility compliance is mandatory - all UI changes must pass Axe checks. Server components must fetch data directly, never via tRPC or server actions. Use @multiverse-io/stardust-react components where available. Respect existing import ordering enforced by eslint-plugin-import. Integration tests use separate vitest config (vitest.integration.config.mjs) with Prisma DB push. All consumer handlers must have integration tests. SonarJS cognitive complexity limit of 10."

MAX_LOC=300
