# .auto_claude.conf - SEA-1280: Deprecate AIBV, BTF, AISL survey creation
# Scoped test suites for survey creation and section builder changes

# Ensure Node dotenv-cli is found before Python dotenv on PATH
export PATH="./node_modules/.bin:$PATH"

test_suite_backend() {
  cd "$PROJECT_ROOT/apps/backend" && yarn test:without-seed -- --grep "createSurveyInstance|sectionBuilder|survey creation|section builder" 2>&1
}

PLAN_CONTEXT="SEA-1280: Remove AISL, BTF, AIBV from survey creation flow. Filter deprecated programmes at application layer (utils.ts), clean up sectionBuilder config, update unit and e2e tests to use AISB. Scoring logic must remain untouched for historical data."

REVIEW_EXTRAS="Structured logger (not console) — logger.warn takes (Error, metadata?) not (string, metadata). Do NOT remove LevyProgrammeCode or ApprenticeshipQualificationId enum entries for deprecated programmes. Do NOT modify SurveyResultRepository.ts or programme-fit-scoring-config.ts. Primary keys must be {entityName}Id camelCase."

MAX_LOC=300
