# .auto_claude.conf - Platform (Multiverse apprenticeship management monolith)
# Elixir Phoenix - Event-driven monolith with RabbitMQ, Oban Pro, PostgreSQL

# Fix devenv override: devenv exports PGHOST=/tmp/devenv-XXXXX/postgres and PGPORT=54321.
# Postgrex reads PGHOST/PGPORT at the libpq level AND Ecto reads DATABASE_HOST/DATABASE_PORT.
# Unset the devenv vars and set both layers to ensure correct connection.
unset PGPORT
export PGHOST=127.0.0.1
export PGPORT=5432
export DATABASE_HOST=127.0.0.1
export DATABASE_PORT=5432

test_suite_mix() {
  # Scope tests to changed files to avoid pre-existing failures in the full suite.
  # Finds test files corresponding to changed .ex files, falls back to full suite if none found.
  # Use baseline commit from state file if available, otherwise HEAD~1
  local base_ref="HEAD~1"
  local state_file="${PROJECT_ROOT:-.}/.auto_claude_state.json"
  if [ -f "$state_file" ]; then
    local baseline
    baseline=$(jq -r '.run.baseline_commit // empty' "$state_file" 2>/dev/null)
    [ -n "$baseline" ] && base_ref="$baseline"
  fi

  local changed_test_files
  changed_test_files=$( \
    { git diff --name-only "$base_ref"..HEAD -- '*.ex' '*.exs' 2>/dev/null; \
      git ls-files --others --exclude-standard -- '*.ex' '*.exs' 2>/dev/null; \
    } | \
    grep -E '^(lib|test)/' | \
    sed 's|^lib/|test/|; s|\.ex$|_test.exs|' | \
    while read -r f; do [ -f "$f" ] && echo "$f"; done | \
    sort -u | tr '\n' ' ')

  if [ -z "$changed_test_files" ]; then
    # No matching test files found — run full suite as fallback
    PGHOST=127.0.0.1 PGPORT=5432 DATABASE_HOST=127.0.0.1 DATABASE_PORT=5432 mix test --exclude not_implemented --color
  else
    PGHOST=127.0.0.1 PGPORT=5432 DATABASE_HOST=127.0.0.1 DATABASE_PORT=5432 mix test --exclude not_implemented --color $changed_test_files
  fi
}

PLAN_CONTEXT="Multiverse Platform monolith (Elixir 1.16, Phoenix 1.7, PostgreSQL, RabbitMQ, Oban Pro). Manages apprenticeships, onboarding, progress, coach world, and acquisitions. Event-driven via Broadway/RabbitMQ with 20+ consumers. Owned by shared-ownership + 10 squads."

REVIEW_EXTRAS="Must pass mix format + mix credo -a (strict mode). HTTPoison forbidden—use Telepoison. No underscore route segments. Warnings treated as errors. Sobelow security checks enforced. Elm frontend must pass elm-review + elm-test."

MAX_LOC=300
